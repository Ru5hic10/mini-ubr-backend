services:
  postgres:
    image: postgres:16-alpine
    container_name: miniuber-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - miniuber-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: miniuber-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - miniuber-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: miniuber-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - miniuber-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: miniuber-redis
    ports:
      - "6379:6379"
    networks:
      - miniuber-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    build: ./eureka-server
    container_name: miniuber-eureka
    ports:
      - "8761:8761"
    volumes:
      - ./logs:/logs
    networks:
      - miniuber-network
    environment:
      - JAVA_OPTS=-Xmx256m -Xms128m
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 5

  api-gateway:
    build: ./api-gateway
    container_name: miniuber-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/logs
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-Xmx256m -Xms128m
    depends_on:
      eureka-server:
        condition: service_started
    networks:
      - miniuber-network

  auth-service:
    build: ./auth-service
    container_name: miniuber-auth
    ports:
      - "8081:8081"
    volumes:
      - ./logs:/logs
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/auth_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JAVA_OPTS=-Xmx256m -Xms128m
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - miniuber-network

  user-service:
    build: ./user-service
    container_name: miniuber-user
    ports:
      - "8082:8082"
    volumes:
      - ./logs:/logs
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/user_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-Xmx256m -Xms128m
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - miniuber-network

  driver-service:
    build: ./driver-service
    container_name: miniuber-driver
    ports:
      - "8084:8084"
    volumes:
      - ./logs:/logs
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/driver_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-Xmx256m -Xms128m
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - miniuber-network

  ride-service:
    build: ./ride-service
    container_name: miniuber-ride
    ports:
      - "8083:8083"
    volumes:
      - ./logs:/logs
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ride_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - JAVA_OPTS=-Xmx256m -Xms128m
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - miniuber-network

  location-service:
    build: ./location-service
    container_name: miniuber-location
    ports:
      - "8085:8085"
    volumes:
      - ./logs:/logs
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/location_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - JAVA_OPTS=-Xmx256m -Xms128m
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - miniuber-network

  payment-service:
    build: ./payment-service
    container_name: miniuber-payment
    ports:
      - "8086:8086"
    volumes:
      - ./logs:/logs
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/payment_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-Xmx256m -Xms128m
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - miniuber-network

volumes:
  postgres_data:

networks:
  miniuber-network:
    driver: bridge
